<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Ski Management</title>
        <meta charset="utf-8">
        <script src="ski.js" type="text/javaScript"></script>
    </head>
    <body>
        <div id="signupdiv">
            <table id="signuptable">
                <tr>
                    <td> 
                        <label>Username:</label>
                        <input id="usernameIn" type="text">
                    </td>
                </tr>
                <tr>
                    <td> 
                        <label>Password:</label>
                        <input id="passwordIn" type="password">
                    </td>
                </tr>
                <tr>
                    <td> 
                        <label>Email:</label>
                        <input id="emailIn" type="email">
                    </td>
                </tr>
                <tr>
                    <td> 
                        <label>First Name:</label>
                        <input id="firstNameIn" type="text">
                    </td>
                </tr>
                <tr>
                    <td> 
                        <label>Last Name:</label>
                        <input id="lastNameIn" type="text">
                    </td>
                </tr>
                <tr>
                    <td>
                        <button id="signup">Sign up</button>
                    </td>
                </tr>
            </table> 
        </div>
        <button id="login">login</button>
    </body>
</html>
